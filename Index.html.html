<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which City in China is Right for You? — Wei Let's Study in China</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Sarabun:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --gold: #D4A847;
    --ink: #1a1208;
    --cream: #FAF6EE;
    --paper: #F2ECD8;
    --muted: #8a7a5a;
    --accent: #8B1A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    font-family: 'Sarabun', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(192,57,43,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(212,168,71,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Language Toggle */
  .lang-toggle {
    display: flex;
    justify-content: flex-end;
    padding: 16px 0 0;
  }
  .lang-btn-wrap {
    display: flex;
    background: white;
    border: 1.5px solid rgba(139,26,26,0.15);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 1px 8px rgba(26,18,8,0.06);
  }
  .lang-btn {
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Sarabun', sans-serif;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .lang-btn.active {
    background: var(--red);
    color: white;
    border-radius: 30px;
  }

  .header {
    text-align: center;
    padding: 32px 0 28px;
    animation: fadeDown 0.8s ease both;
  }
  .brand {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .title em { font-style: italic; color: var(--gold); }
  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 12px;
  }
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--gold));
    margin: 20px auto;
    border-radius: 2px;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.2s;
  }
  .progress-bar {
    height: 3px;
    background: rgba(139,26,26,0.12);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-text {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.05em;
  }

  /* Card */
  .card {
    background: white;
    border-radius: 4px;
    padding: 36px 40px;
    box-shadow: 0 2px 24px rgba(26,18,8,0.08), 0 0 0 1px rgba(212,168,71,0.15);
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold));
  }
  .q-number {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3.5vw, 22px);
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 28px;
    font-weight: 700;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid rgba(139,26,26,0.12);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    text-align: left;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
  }
  .option:hover {
    border-color: var(--red);
    background: rgba(192,57,43,0.03);
    transform: translateX(4px);
  }
  .option.selected {
    border-color: var(--red);
    background: rgba(192,57,43,0.06);
  }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--paper);
    border: 1.5px solid rgba(139,26,26,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--red);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option.selected .option-letter {
    background: var(--red); color: white; border-color: var(--red);
  }

  /* Start screen */
  .start-screen { text-align: center; padding: 16px 0; }
  .intro-text { font-size: 16px; line-height: 1.8; color: #555; margin-bottom: 32px; }
  .cities-preview {
    display: flex; justify-content: center;
    flex-wrap: wrap; gap: 8px; margin-bottom: 36px;
  }
  .city-chip {
    padding: 6px 14px;
    background: var(--paper);
    border: 1px solid rgba(212,168,71,0.4);
    border-radius: 20px;
    font-size: 13px; color: var(--muted);
  }

  .btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--red); color: white;
    border: none; border-radius: 4px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(192,57,43,0.3);
  }
  .btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(192,57,43,0.4);
  }
  .btn-outline {
    background: transparent; color: var(--red);
    border: 1.5px solid var(--red);
    box-shadow: none; margin-top: 12px;
    font-size: 14px; padding: 11px 28px;
  }
  .btn-outline:hover { background: rgba(192,57,43,0.05); box-shadow: none; }

  /* Result */
  .result-screen { animation: fadeUp 0.6s ease both; }
  .result-city-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 52px);
    font-weight: 700; color: var(--red);
    line-height: 1; margin-bottom: 4px;
  }
  .result-city-cn {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; color: var(--gold); margin-bottom: 20px;
  }
  .result-emoji { font-size: 52px; margin-bottom: 16px; display: block; }
  .result-badge {
    display: inline-block;
    padding: 4px 14px;
    background: var(--paper); border: 1px solid var(--gold);
    border-radius: 20px; font-size: 12px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px;
  }
  .result-desc { font-size: 16px; line-height: 1.9; color: #444; margin-bottom: 24px; }
  .result-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .tag {
    padding: 5px 12px;
    background: rgba(192,57,43,0.07);
    border-radius: 20px; font-size: 13px;
    color: var(--red); font-weight: 600;
  }
  .cta-box {
    background: var(--paper);
    border: 1px solid rgba(212,168,71,0.3);
    border-radius: 4px; padding: 20px 24px;
    margin-top: 24px; text-align: center;
  }
  .cta-box p { font-size: 14px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
  .cta-box strong { color: var(--ink); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hidden { display: none !important; }
  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
    .container { padding: 12px; }
  }
</style>
</head>

<div class="container">

  <!-- Language Toggle -->
  <div class="lang-toggle">

      <div class="result-badge" id="result-type"></div>
    </div>
    <p class="result-desc" id="result-desc"></p>
    <div class="result-tags" id="result-tags"></div>
    <div style="font-size:15px; color:#555; line-height:1.8; margin-bottom:20px;" id="result-study"></div>
    <div class="cta-box">
      <p id="cta-text"></p>
      <button class="btn" id="cta-btn" onclick="alert('DM หา Wei ได้เลยนะคะ! 🎉')"></button>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <button class="btn btn-outline" id="retry-btn" onclick="resetQuiz()"></button>
    </div>
  </div>

</div>

// ─── STATE ───────────────────────────────────────────────────────
let lang = 'th';
let currentQ = 0;
let scores = { beijing:0, shanghai:0, chengdu:0, guangzhou:0, shenzhen:0, kunming:0 };
let lastResult = null;

// ─── LANGUAGE ────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-th').classList.toggle('active', l === 'th');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');

  // update header
  document.getElementById('header-title').innerHTML = t[lang].headerTitle;
  document.getElementById('header-subtitle').textContent = t[lang].headerSubtitle;
  document.getElementById('intro-text').textContent = t[lang].introText;
  document.getElementById('start-btn').textContent = t[lang].startBtn;

  // city chips
  document.querySelectorAll('.city-label').forEach(el => {
    el.textContent = el.dataset[lang];
  });

  // if quiz is running, re-render current question
  if (!document.getElementById('quiz-screen').classList.contains('hidden')) {
    renderQuestion();
  }

  // if result is showing, re-render result
  if (!document.getElementById('result-screen').classList.contains('hidden') && lastResult) {
    renderResult(lastResult);
  }
}

// ─── QUIZ ────────────────────────────────────────────────────────
function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const qLabel = lang === 'th'
    ? `${t.th.questionLabel} ${currentQ + 1}`
    : `${t.en.questionLabel} ${String(currentQ + 1).padStart(2,'0')}`;

  document.getElementById('q-number').textContent = qLabel;
  document.getElementById('q-text').textContent = q[lang];
  document.getElementById('progress-text').textContent =
    lang === 'th'
      ? `ข้อ ${currentQ + 1} ${t.th.progressOf} ${total}`
      : `${currentQ + 1} ${t.en.progressOf} ${total}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt[lang]}</span>`;
    btn.onclick = () => selectOption(opt.scores, btn);
    container.appendChild(btn);
  });

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectOption(optScores, btn) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => {
    Object.keys(optScores).forEach(city => { scores[city] += optScores[city]; });
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
      lastResult = winner;
      document.getElementById('quiz-screen').classList.add('hidden');
      renderResult(winner);
      document.getElementById('result-screen').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }, 350);
}

function renderResult(winner) {
  const r = results[winner];
  const isEn = lang === 'en';

  document.getElementById('result-label').textContent = t[lang].resultLabel;
  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-city').textContent = isEn ? r.nameEn : r.nameTh;
  document.getElementById('result-city-cn').textContent = r.nameCn;
  document.getElementById('result-type').textContent = isEn ? r.typeEn : r.typeTh;
  document.getElementById('result-desc').textContent = isEn ? r.descEn : r.descTh;
  document.getElementById('result-study').textContent = isEn ? r.studyEn : r.studyTh;

  const cityName = isEn ? r.nameEn : r.nameTh;
  document.getElementById('cta-text').textContent = t[lang].ctaText(cityName);
  document.getElementById('cta-btn').textContent = t[lang].ctaBtn;
  document.getElementById('retry-btn').textContent = t[lang].retryBtn;

  document.getElementById('result-tags').innerHTML =
    r.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
}

function resetQuiz() {
  currentQ = 0;
  lastResult = null;
  scores = { beijing:0, shanghai:0, chengdu:0, guangzhou:0, shenzhen:0, kunming:0 };
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
